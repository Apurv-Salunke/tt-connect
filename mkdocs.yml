site_name: tt-connect
site_description: Unified broker API for Indian markets
site_url: https://tiny-trader.github.io/connect/

docs_dir: docs_site
repo_url: https://github.com/Tiny-Trader/connect
repo_name: Tiny-Trader/connect

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.tabs.link
    - content.code.copy
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Getting Started:
    - Home: index.md
    - Getting Started: getting-started.md
  - Guides:
    - Authentication: authentication.md
    - Instruments: instruments.md
    - Orders: orders.md
    - Portfolio: portfolio.md
    - Market Data: market-data.md
    - GTT Orders: gtt.md
    - WebSocket: websocket.md
  - Operations:
    - Error Handling: error-handling.md
    - Broker Differences: broker-differences.md
  - Troubleshooting:
    - Auth Failures: troubleshooting/auth-failures.md
    - Instrument Not Found: troubleshooting/instrument-not-found.md
    - Order Rejected: troubleshooting/order-rejected.md
    - Duplicate Orders: troubleshooting/duplicate-orders.md
  - Recipes:
    - First Order: recipes/first-order.md
    - Cancel All Orders: recipes/cancel-all-open-orders.md
    - Close All Positions: recipes/close-all-open-positions.md
    - Stream Live Ticks: recipes/stream-and-store-live-ticks.md
  - Reference:
    - Client API: reference/clients.md
    - Models & Enums: reference/models.md
    - Exceptions: reference/exceptions.md
